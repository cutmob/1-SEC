{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "1sec.fullname" . }}
  labels:
    {{- include "1sec.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "1sec.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.apiPort }}
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    - ports:
        - protocol: UDP
          port: {{ .Values.service.syslogPort }}
        - protocol: TCP
          port: {{ .Values.service.syslogPort }}
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if .Values.service.exposeNats }}
    - ports:
        - protocol: TCP
          port: {{ .Values.service.natsPort }}
      {{- with .Values.networkPolicy.natsFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
